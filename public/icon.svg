<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#FFB5A7"/>

  <!-- Stars -->
  <text x="72" y="130" font-size="52" text-anchor="middle" opacity="0.9">⭐</text>
  <text x="440" y="110" font-size="36" text-anchor="middle" opacity="0.8">✨</text>
  <text x="400" y="390" font-size="40" text-anchor="middle" opacity="0.8">⭐</text>
  <text x="90" y="400" font-size="30" text-anchor="middle" opacity="0.7">✨</text>
  <text x="460" y="260" font-size="28" text-anchor="middle" opacity="0.7">⭐</text>

  <!-- Swing ropes (from top bar) -->
  <!-- Top bar -->
  <rect x="140" y="140" width="232" height="16" rx="8" fill="#FEC89A"/>
  <!-- Left rope -->
  <line x1="175" y1="156" x2="195" y2="295" stroke="#FEC89A" stroke-width="8" stroke-linecap="round"/>
  <!-- Right rope -->
  <line x1="337" y1="156" x2="317" y2="295" stroke="#FEC89A" stroke-width="8" stroke-linecap="round"/>
  <!-- Swing seat -->
  <rect x="180" y="288" width="152" height="22" rx="11" fill="#C7CEEA"/>

  <!-- Person sitting on swing -->
  <!-- Body -->
  <ellipse cx="256" cy="270" rx="28" ry="30" fill="#FFDDE1"/>
  <!-- Head -->
  <circle cx="256" cy="232" r="32" fill="#FFDDE1"/>
  <!-- Face - eyes -->
  <circle cx="245" cy="228" r="4" fill="#666"/>
  <circle cx="267" cy="228" r="4" fill="#666"/>
  <!-- Face - smile -->
  <path d="M244 240 Q256 252 268 240" stroke="#666" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Hair -->
  <path d="M226 220 Q230 196 256 194 Q282 196 286 220" fill="#B5EAD7" stroke="none"/>
  <!-- Legs hanging -->
  <line x1="242" y1="298" x2="228" y2="340" stroke="#FFDDE1" stroke-width="12" stroke-linecap="round"/>
  <line x1="270" y1="298" x2="284" y2="340" stroke="#FFDDE1" stroke-width="12" stroke-linecap="round"/>
  <!-- Feet -->
  <ellipse cx="222" cy="345" rx="12" ry="8" fill="#C7CEEA"/>
  <ellipse cx="290" cy="345" rx="12" ry="8" fill="#C7CEEA"/>

  <!-- Small sparkles around -->
  <circle cx="145" cy="275" r="6" fill="white" opacity="0.8"/>
  <circle cx="370" cy="220" r="8" fill="white" opacity="0.6"/>
  <circle cx="160" cy="350" r="5" fill="white" opacity="0.7"/>
</svg>
